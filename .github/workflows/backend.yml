name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - "backend/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
      - name: Build with Maven
        run: mvn -B package --no-transfer-progress
        working-directory: backend