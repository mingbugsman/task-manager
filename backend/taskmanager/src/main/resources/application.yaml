spring:
  application:
    name: TaskManager

  # config datasource
  datasource:
    url: jdbc:mysql://localhost:3307/task_manager_db
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  # config jpa
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # config flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    url: jdbc:mysql://localhost:3307/task_manager_db
    user: root
    password: 123456

logging:
  level:
    org.flywaydb: DEBUG